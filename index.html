<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル動画リンク生成</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #fff; padding: 40px 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 450px; width: 90%; box-sizing: border-box; }
        h2 { color: #1e3a8a; margin: 0 0 10px 0; font-size: 24px; font-weight: bold; }
        p { font-size: 13px; color: #666; margin-bottom: 25px; line-height: 1.6; text-align: left; }
        .input-area { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        input[type="text"] { display: block; width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; background: #fff; font-size: 14px; text-align: center; }
        button { background: #3b82f6; color: #fff; border: none; padding: 14px 24px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; width: 100%; }
        button:hover { background: #2563eb; }
        .output { margin-top: 25px; padding: 20px; background: #f1f5f9; border-radius: 8px; display: none; text-align: left; }
        .output-title { font-weight: bold; color: #2563eb; font-size: 14px; display: block; margin-bottom: 8px; }
        textarea { width: 100%; height: 60px; border: 1px solid #cbd5e1; border-radius: 4px; padding: 8px; box-sizing: border-box; resize: none; font-size: 13px; background: #fff; color: #333; }
    </style>
</head>
<body>

<div class="box">
    <h2>シンプル動画リンク生成</h2>
    <p>Googleドライブに動画をアップロードし、「リンクを知っている全員」に設定してコピーしたURLを、下の枠に貼り付けてください。Discordで直接開けるリンクに変換します。</p>
    
    <div class="input-area">
        <input type="text" id="drive-url" placeholder="ここにGoogleドライブのリンクを貼り付け">
    </div>
    
    <button onclick="makeLink()">リンクを生成</button>

    <div class="output" id="out">
        <span class="output-title">✨ Discord用のリンクが完成しました！</span>
        <p style="margin: 0 0 8px 0; font-size: 12px; color: #666;">下のURLをコピーしてDiscordに貼り付けてください：</p>
        <textarea id="result-url" readonly></textarea>
    </div>
</div>

<script>
    function makeLink() {
        const input = document.getElementById('drive-url').value.trim();
        if (!input) { alert('URLを入力してください！'); return; }
        
        // GoogleドライブのURLから動画のIDを抜き出す
        const matches = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
        
        if (!matches) {
            alert('Googleドライブの正しい共有リンクを入力してください！\n（例: https://drive.google.com/file/d/...）');
            return;
        }
        
        const fileId = matches[1];
        // 友達が開いた時に動画プレイヤーだけにする特殊なURLに変身させる
        const directUrl = `https://drive.google.com/file/d/${fileId}/preview`;
        
        document.getElementById('result-url').value = directUrl;
        document.getElementById('out').style.display = 'block';
    }
</script>

</body>
</html>
